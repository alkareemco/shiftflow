name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare source files
        run: |
          mkdir -p app
          if [ -f "shiftflow.zip" ]; then
            echo "📦 Unzipping shiftflow.zip into app/..."
            unzip -o "shiftflow.zip" -d app
          elif [ -d "app" ] && [ -f "app/package.json" ]; then
            echo "📂 Source files already present in app/"
          elif [ -f "package.json" ]; then
            echo "📂 Source files in root, copying to app/..."
            cp -r ./* app/ 2>/dev/null || true
          fi

          # Flatten nested folder if package.json is inside a subfolder
          if [ ! -f "app/package.json" ]; then
            PKG_PATH=$(find app -name "package.json" -not -path "*/node_modules/*" | head -n 1)
            if [ -n "$PKG_PATH" ]; then
              SUBDIR=$(dirname "$PKG_PATH")
              if [ "$SUBDIR" != "app" ]; then
                echo "📂 Found package.json in $SUBDIR. Flattening contents to app/..."
                cp -r "$SUBDIR"/* "app/" 2>/dev/null || true
                cp -r "$SUBDIR"/.* "app/" 2>/dev/null || true
              fi
            fi
          fi

          if [ ! -f "app/package.json" ]; then
            echo "Creating fallback package.json..."
            echo '{"name":"app","private":true,"version":"1.0.0","type":"module","scripts":{"build":"vite build --base=./ || react-scripts build || next build || echo Build skipped"}}' > app/package.json
          fi
          echo "--- Contents of app/ ---"
          ls -la app/

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: app
        run: |
          npm install --legacy-peer-deps || npm install
          python3 -c "import json, os, subprocess; pkg = json.load(open('package.json')) if os.path.exists('package.json') else {}; deps = {**pkg.get('dependencies', {}), **pkg.get('devDependencies', {})}; needed = [p for p in ['react@^18.3.1', 'react-dom@^18.3.1', '@vitejs/plugin-react@^4.3.1', 'vite@^5.4.0'] if p.split('@')[0] not in deps and not (p.startsWith('@vitejs/plugin-react') and '@vitejs/plugin-react-swc' in deps)]; (print('⚡ Installing missing React/Vite packages:', ' '.join(needed)) or subprocess.run(['npm', 'install', '--save-dev', '--legacy-peer-deps'] + needed)) if needed else None" || true
          npm install @capacitor/core@6 @capacitor/cli@6 @capacitor/android@6 --save --legacy-peer-deps

      - name: Inject Environment Secrets (.env)
        working-directory: app
        run: |
          touch .env .env.local
          if [ -n "${{ secrets.GEMINI_API_KEY }}" ]; then
            echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
            echo "VITE_GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
            echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env.local
            echo "VITE_GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env.local
          fi
          if [ -n "${{ secrets.RESEND_API_KEY }}" ]; then
            echo "RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}" >> .env
          fi

      - name: Build web app
        working-directory: app
        run: |
          echo "🔨 Starting Web App Compilation..."
          python3 -c "import os, glob, shutil; app_name = '''Shiftflow'''; cands = [c for c in glob.glob('./**/index.html', recursive=True) if not any(x in c for x in ['node_modules','dist','build','out'])]; (shutil.copy(cands[0], 'index.html') if cands and not os.path.isfile('index.html') else None); entry = next(( '/' + p for p in ['src/main.tsx', 'src/main.jsx', 'src/main.ts', 'src/main.js', 'src/index.tsx', 'src/index.jsx', 'src/index.js', 'src/App.tsx', 'src/App.jsx'] if os.path.isfile(p)), ''); (open('index.html', 'w', encoding='utf-8').write(f'<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{app_name}</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="{entry}"></script>
  </body>
</html>') if entry and not os.path.isfile('index.html') else None); (open('vite.config.ts', 'w', encoding='utf-8').write('import { defineConfig } from "vite";
import react from "@vitejs/plugin-react";

export default defineConfig({
  plugins: [react()],
  base: "./",
});
') if not any(os.path.isfile(f) for f in ['vite.config.ts', 'vite.config.js', 'vite.config.mjs']) else None)"

          if grep -q '"build":' package.json 2>/dev/null; then
            echo "📦 Running npm run build..."
            npm run build || npx vite build --base=./ || true
          elif [ -f "vite.config.ts" ] || [ -f "vite.config.js" ] || grep -q "vite" package.json 2>/dev/null; then
            echo "⚡ Vite project detected. Building with relative base './'..."
            npx vite build --base=./ || npm run build || true
          else
            echo "Building with npm run build..."
            npm run build || true
          fi

          if [ ! -d "dist" ] || [ ! -f "dist/index.html" ]; then
            if [ -d "build" ] && [ -f "build/index.html" ]; then
              echo "📂 Found build directory with index.html, copying to dist..."
              mkdir -p dist && cp -r build/* dist/
            elif [ -d "out" ] && [ -f "out/index.html" ]; then
              echo "📂 Found out directory with index.html, copying to dist..."
              mkdir -p dist && cp -r out/* dist/
            elif [ -f "dist/public/index.html" ]; then
              echo "📂 Found dist/public/index.html, copying to dist root..."
              cp -r dist/public/* dist/
            fi
          fi

          if [ ! -f "dist/index.html" ]; then
            echo "❌ ERROR: dist/index.html was not generated by the build process!"
            echo "Directory contents:"
            ls -la
            exit 1
          fi

          python3 -c "import os; p='dist/index.html'; (open(p,'w',encoding='utf-8').write(open(p,'r',encoding='utf-8',errors='ignore').read().replace('href="/assets','href="./assets').replace('src="/assets','src="./assets').replace('href="/"','href="./"').replace('src="/"','src="./"')) if os.path.isfile(p) else None); print('✓ Relative asset paths updated in dist/index.html')"

          echo "--- Contents of dist/ ---"
          ls -la dist/

      - name: Set up Capacitor for Android
        working-directory: app
        run: |
          python3 -c "import json; open('capacitor.config.json', 'w').write(json.dumps({'appId': 'com.alkareemco.shiftflow', 'appName': '''Shiftflow''', 'webDir': 'dist', 'server': {'androidScheme': 'https'}}, indent=2))"

          npx cap add android || true
          npx cap sync android

      - name: Apply Custom App Icon
        working-directory: app
        run: |
          ICON_SRC=""
          for f in icon.png icon.jpg icon.svg app-icon.png public/icon.png public/icon.jpg public/icon.svg public/favicon.ico favicon.ico; do
            if [ -f "$f" ]; then ICON_SRC="$f"; break; fi
          done
          if [ -z "$ICON_SRC" ]; then
            ICON_SRC=$(find . -maxdepth 3 ( -name "icon.png" -o -name "icon.jpg" -o -name "icon.svg" -o -name "app-icon.png" ) | head -n 1)
          fi

          if [ -n "$ICON_SRC" ] && [ -d "android/app/src/main/res" ]; then
            echo "🎨 Custom App Icon found at: $ICON_SRC. Updating Android launcher icons..."
            for dir in android/app/src/main/res/mipmap-*; do
              if [ -d "$dir" ]; then
                cp "$ICON_SRC" "$dir/ic_launcher.png" 2>/dev/null || true
                cp "$ICON_SRC" "$dir/ic_launcher_round.png" 2>/dev/null || true
                cp "$ICON_SRC" "$dir/ic_launcher_foreground.png" 2>/dev/null || true
              fi
            done
            rm -f android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml 2>/dev/null || true
            rm -f android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml 2>/dev/null || true
            echo "✅ Custom launcher icon successfully applied!"
          fi

      - name: Build DEBUG APK
        working-directory: app/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK as GitHub Artifact
        uses: actions/upload-artifact@v4
        with:
          name: shiftflow-debug-apk
          path: app/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: v${{ github.run_number }}
          name: Shiftflow APK v${{ github.run_number }}
          body: |
            ## 📱 Shiftflow v${{ github.run_number }}
            - Automated build from commit ${{ github.sha }}
          files: app/android/app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send Email Notification via Resend
        if: always()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          JOB_STATUS: ${{ job.status }}
          RUN_NUMBER: ${{ github.run_number }}
          COMMIT_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        run: |
          if [ -z "$RESEND_API_KEY" ]; then
            echo "ℹ️ RESEND_API_KEY secret not set, skipping email notification"
            exit 0
          fi
          python3 -c "import os, json, urllib.request; key = os.environ.get('RESEND_API_KEY',''); exit(0) if not key else None; status = os.environ.get('JOB_STATUS','unknown'); icon = '✅' if status=='success' else '❌' if status=='failure' else '⚠️'; color = '#22c55e' if status=='success' else '#ef4444' if status=='failure' else '#f59e0b'; app = '''Shiftflow'''; run_num = os.environ.get('RUN_NUMBER',''); commit = os.environ.get('COMMIT_SHA','')[:7]; repo = os.environ.get('REPO',''); recs = [r.strip() for r in ''''''.split(',') if r.strip()] or ['build@alkareem.co']; body = f'<html><body style="font-family:sans-serif;max-width:600px;margin:0 auto;padding:20px;"><div style="background:#0f172a;color:white;padding:20px;border-radius:10px;text-align:center;"><h2 style="margin:0;">{app}</h2><p style="color:#94a3b8;margin:5px 0 0;">GitHub Actions Build Notification</p></div><div style="background:#f8fafc;border:1px solid #e2e8f0;padding:16px;border-radius:8px;margin-top:16px;"><p><strong>Status:</strong> <span style="color:{color};font-weight:bold;">{icon} {status.upper()}</span></p><p><strong>Run Number:</strong> #{run_num}</p><p><strong>Commit:</strong> <code>{commit}</code></p><p><strong>Repository:</strong> {repo}</p></div></body></html>'; req = urllib.request.Request('https://api.resend.com/emails', data=json.dumps({'from': 'build@alkareem.co', 'to': recs, 'subject': f'{icon} [{status.upper()}] {app} v{run_num}', 'html': body}).encode('utf-8'), headers={'Authorization': f'Bearer {key}', 'Content-Type': 'application/json'}); (print('✅ Resend email sent!') if urllib.request.urlopen(req, timeout=30) else None)" || echo "⚠️ Resend email non-fatal notice"
