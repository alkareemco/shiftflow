name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare source files
        run: |
          mkdir -p app
          if [ -f "shiftflow.zip" ]; then
            echo "📦 Unzipping shiftflow.zip into app/..."
            unzip -o "shiftflow.zip" -d app
          elif [ -d "app" ] && [ -f "app/package.json" ]; then
            echo "📂 Source files already present in app/"
          elif [ -f "package.json" ]; then
            echo "📂 Source files in root, copying to app/..."
            cp -r ./* app/ 2>/dev/null || true
          fi

          # Flatten nested folder if package.json is inside a subfolder
          if [ ! -f "app/package.json" ]; then
            PKG_PATH=$(find app -name "package.json" -not -path "*/node_modules/*" | head -n 1)
            if [ -n "$PKG_PATH" ]; then
              SUBDIR=$(dirname "$PKG_PATH")
              if [ "$SUBDIR" != "app" ]; then
                echo "📂 Found package.json in $SUBDIR. Flattening contents to app/..."
                cp -r "$SUBDIR"/* "app/" 2>/dev/null || true
                cp -r "$SUBDIR"/.* "app/" 2>/dev/null || true
              fi
            fi
          fi

          if [ ! -f "app/package.json" ]; then
            echo "Creating fallback package.json..."
            echo '{"name":"app","private":true,"version":"1.0.0","type":"module","scripts":{"build":"vite build --base=./ || react-scripts build || next build || echo Build skipped"}}' > app/package.json
          fi
          echo "--- Contents of app/ ---"
          ls -la app/

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: app
        run: |
          npm install --legacy-peer-deps || npm install

          python3 << 'EOF_ENSURE_REACT'
          import json, os, subprocess

          if os.path.exists('package.json'):
              try:
                  with open('package.json', 'r') as f:
                      pkg = json.load(f)
                  deps = {**pkg.get('dependencies', {}), **pkg.get('devDependencies', {})}

                  needed = []
                  if 'react' not in deps:
                      needed.append('react@^18.3.1')
                  if 'react-dom' not in deps:
                      needed.append('react-dom@^18.3.1')
                  if '@vitejs/plugin-react' not in deps and '@vitejs/plugin-react-swc' not in deps:
                      needed.append('@vitejs/plugin-react@^4.3.1')
                  if 'vite' not in deps:
                      needed.append('vite')

                  if needed:
                      print('⚡ Installing missing React/Vite build packages:', ' '.join(needed))
                      subprocess.run(['npm', 'install', '--save-dev', '--legacy-peer-deps'] + needed)
              except Exception as e:
                  print('⚠️ Dependency check warning:', e)
          EOF_ENSURE_REACT

          npm install @capacitor/core@6 @capacitor/cli@6 @capacitor/android@6 --save --legacy-peer-deps

      - name: Inject Environment Secrets (.env)
        working-directory: app
        run: |
          touch .env .env.local
          if [ -n "${{ secrets.GEMINI_API_KEY }}" ]; then
            echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
            echo "VITE_GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
            echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env.local
            echo "VITE_GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env.local
          fi
          if [ -n "${{ secrets.RESEND_API_KEY }}" ]; then
            echo "RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}" >> .env
          fi

      - name: Build web app
        working-directory: app
        run: |
          echo "🔨 Starting Web App Compilation..."

          python3 << 'EOF_PREP_INDEX'
          import os, glob, shutil

          app_name = """Shiftflow"""

          # 1. Check if index.html exists in root, or copy from subdirectories
          if not os.path.isfile('index.html'):
              candidates = glob.glob('./**/index.html', recursive=True)
              candidates = [c for c in candidates if 'node_modules' not in c and 'dist' not in c and 'build' not in c and 'out' not in c]
              if candidates:
                  shutil.copy(candidates[0], 'index.html')
                  print('📄 Copied existing index.html from:', candidates[0])

          # 2. If index.html is STILL missing, auto-detect React entry point and generate clean HTML5 index.html
          if not os.path.isfile('index.html'):
              entry = ''
              for p in ['src/main.tsx', 'src/main.jsx', 'src/main.ts', 'src/main.js', 'src/index.tsx', 'src/index.jsx', 'src/index.js', 'src/App.tsx', 'src/App.jsx']:
                  if os.path.isfile(p):
                      entry = '/' + p
                      break

              script_tag = f'<script type="module" src="{entry}"></script>' if entry else ''
              html_content = f'''<!DOCTYPE html>
          <html lang="en">
            <head>
              <meta charset="UTF-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <title>{app_name}</title>
            </head>
            <body>
              <div id="root"></div>
              {script_tag}
            </body>
          </html>'''
              with open('index.html', 'w', encoding='utf-8') as f:
                  f.write(html_content)
              print('⚡ Auto-generated clean index.html linking to entry point:', entry or 'none')

          # 3. Auto-generate vite.config.ts if missing and React is present
          if not os.path.isfile('vite.config.ts') and not os.path.isfile('vite.config.js') and not os.path.isfile('vite.config.mjs'):
              v_cfg = """import { defineConfig } from 'vite';
import react from '@vitejs/plugin-react';

export default defineConfig({
  plugins: [react()],
  base: './',
});
"""
              with open('vite.config.ts', 'w', encoding='utf-8') as f:
                  f.write(v_cfg)
              print('⚡ Auto-generated vite.config.ts with @vitejs/plugin-react plugin')
          EOF_PREP_INDEX

          if grep -q '"build":' package.json 2>/dev/null; then
            echo "📦 Running npm run build..."
            npm run build || npx vite build --base=./ || true
          elif [ -f "vite.config.ts" ] || [ -f "vite.config.js" ] || grep -q "vite" package.json 2>/dev/null; then
            echo "⚡ Vite project detected. Building with relative base './'..."
            npx vite build --base=./ || npm run build || true
          else
            echo "Building with npm run build..."
            npm run build || true
          fi

          if [ ! -d "dist" ] || [ ! -f "dist/index.html" ]; then
            if [ -d "build" ] && [ -f "build/index.html" ]; then
              echo "📂 Found build directory with index.html, copying to dist..."
              mkdir -p dist && cp -r build/* dist/
            elif [ -d "out" ] && [ -f "out/index.html" ]; then
              echo "📂 Found out directory with index.html, copying to dist..."
              mkdir -p dist && cp -r out/* dist/
            elif [ -f "dist/public/index.html" ]; then
              echo "📂 Found dist/public/index.html, copying to dist root..."
              cp -r dist/public/* dist/
            fi
          fi

          if [ ! -f "dist/index.html" ]; then
            echo "❌ ERROR: dist/index.html was not generated by the build process!"
            echo "Directory contents:"
            ls -la
            exit 1
          fi

          python3 << 'EOF_FIX_PATHS'
          import os
          if os.path.isfile('dist/index.html'):
              with open('dist/index.html', 'r', encoding='utf-8', errors='ignore') as f:
                  content = f.read()
              content = content.replace('href="/assets', 'href="./assets')
              content = content.replace('src="/assets', 'src="./assets')
              content = content.replace('href="/"', 'href="./"')
              content = content.replace('src="/"', 'src="./"')
              with open('dist/index.html', 'w', encoding='utf-8') as f:
                  f.write(content)
              print('✓ Relative asset paths updated in dist/index.html')
          EOF_FIX_PATHS

          echo "--- Contents of dist/ ---"
          ls -la dist/

      - name: Set up Capacitor for Android
        working-directory: app
        run: |
          cat > capacitor.config.json << 'EOF_CAP_CFG'
          {
            "appId": "com.alkareemco.shiftflow",
            "appName": "Shiftflow",
            "webDir": "dist",
            "server": {
              "androidScheme": "https"
            }
          }
          EOF_CAP_CFG

          npx cap add android || true
          npx cap sync android

      - name: Apply Custom App Icon
        working-directory: app
        run: |
          ICON_SRC=""
          for f in icon.png icon.jpg icon.svg app-icon.png public/icon.png public/icon.jpg public/icon.svg public/favicon.ico favicon.ico; do
            if [ -f "$f" ]; then ICON_SRC="$f"; break; fi
          done
          if [ -z "$ICON_SRC" ]; then
            ICON_SRC=$(find . -maxdepth 3 ( -name "icon.png" -o -name "icon.jpg" -o -name "icon.svg" -o -name "app-icon.png" ) | head -n 1)
          fi

          if [ -n "$ICON_SRC" ] && [ -d "android/app/src/main/res" ]; then
            echo "🎨 Custom App Icon found at: $ICON_SRC. Updating Android launcher icons..."
            for dir in android/app/src/main/res/mipmap-*; do
              if [ -d "$dir" ]; then
                cp "$ICON_SRC" "$dir/ic_launcher.png" 2>/dev/null || true
                cp "$ICON_SRC" "$dir/ic_launcher_round.png" 2>/dev/null || true
                cp "$ICON_SRC" "$dir/ic_launcher_foreground.png" 2>/dev/null || true
              fi
            done
            rm -f android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml 2>/dev/null || true
            rm -f android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml 2>/dev/null || true
            echo "✅ Custom launcher icon successfully applied!"
          fi

      - name: Build DEBUG APK
        working-directory: app/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK as GitHub Artifact
        uses: actions/upload-artifact@v4
        with:
          name: shiftflow-debug-apk
          path: app/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: v${{ github.run_number }}
          name: Shiftflow APK v${{ github.run_number }}
          body: |
            ## 📱 Shiftflow v${{ github.run_number }}
            - Automated build from commit ${{ github.sha }}
          files: app/android/app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send Email Notification via Resend
        if: always()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          JOB_STATUS: ${{ job.status }}
          RUN_NUMBER: ${{ github.run_number }}
          COMMIT_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        run: |
          if [ -z "$RESEND_API_KEY" ]; then
            echo "ℹ️ RESEND_API_KEY secret not set, skipping email notification"
            exit 0
          fi
          python3 << 'EOF_RESEND'
          import os, json, urllib.request

          api_key = os.environ.get('RESEND_API_KEY', '')
          if not api_key:
              exit(0)

          app_name = """Shiftflow"""
          status = os.environ.get('JOB_STATUS', 'unknown')
          status_icon = '✅' if status == 'success' else '❌' if status == 'failure' else '⚠️'
          status_color = '#22c55e' if status == 'success' else '#ef4444' if status == 'failure' else '#f59e0b'
          run_number = os.environ.get('RUN_NUMBER', '')
          commit_sha = os.environ.get('COMMIT_SHA', '')[:7]
          repo = os.environ.get('REPO', '')

          recipients_str = """"""
          recipients = [r.strip() for r in recipients_str.split(',') if r.strip()]
          if not recipients:
              recipients = ['build@alkareem.co']

          html_body = f'''
          <html>
          <body style="font-family: system-ui, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; color: #333;">
            <div style="background: #0f172a; color: white; padding: 20px; border-radius: 10px; text-align: center;">
              <h2 style="margin: 0;">{app_name}</h2>
              <p style="color: #94a3b8; margin: 5px 0 0;">GitHub Actions Build Notification</p>
            </div>
            <div style="background: #f8fafc; border: 1px solid #e2e8f0; padding: 16px; border-radius: 8px; margin-top: 16px;">
              <p><strong>Status:</strong> <span style="color: {status_color}; font-weight: bold;">{status_icon} {status.upper()}</span></p>
              <p><strong>Run Number:</strong> #{run_number}</p>
              <p><strong>Commit:</strong> <code>{commit_sha}</code></p>
              <p><strong>Repository:</strong> {repo}</p>
            </div>
            <p style="font-size: 12px; color: #64748b; text-align: center; margin-top: 20px;">
              Automated build notification for {app_name}
            </p>
          </body>
          </html>
          '''

          payload = {
              'from': 'build@alkareem.co',
              'to': recipients,
              'subject': f'{status_icon} [{status.upper()}] {app_name} v{run_number}',
              'html': html_body
          }

          req = urllib.request.Request(
              'https://api.resend.com/emails',
              data=json.dumps(payload).encode('utf-8'),
              headers={
                  'Authorization': f'Bearer {api_key}',
                  'Content-Type': 'application/json'
              }
          )

          try:
              with urllib.request.urlopen(req, timeout=30) as resp:
                  res = json.loads(resp.read())
                  print('✅ Email sent successfully via Resend! ID:', res.get('id', 'ok'))
          except Exception as e:
              print('⚠️ Resend email non-fatal failure:', e)
          EOF_RESEND

